# HCV Airflow — CeleryExecutor with Redis and PostgreSQL.
#
# Deployable via Portainer per environment (main, training).
# Each stack gets its own metadata DB, Redis, and connections to the
# relevant ICU SQL Server and reporting PostgreSQL.
#
# Required environment variables:
#   STACK_NAME                — unique prefix, e.g. "hcv-airflow-prod", "hcv-airflow-training"
#   HCV_ICU_CONN_STRING       — ICU SQL Server ODBC connection string
#   HCV_REPORTING_DB_URL      — reporting PostgreSQL connection string
#   AIRFLOW_ADMIN_PASSWORD    — admin UI password
#   DAGS_REPO_URL             — git clone URL for hcv-airflow-dags
#   DAGS_REPO_BRANCH          — branch to track (e.g. "main", "training")
#
# Optional:
#   DAGS_SYNC_INTERVAL        — seconds between git pulls (default: 60)
#   AIRFLOW_PORT              — host port for the API server (default: 8080)
#   FERNET_KEY                — encryption key for connections (generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
#   API_SECRET_KEY            — shared JWT signing key for API server ↔ worker auth (generate: python -c "import secrets; print(secrets.token_urlsafe(32))")
#
# Portainer usage:
#   Create a stack per branch, set the environment variables above.
#   The stack joins the external hcv-net network so it can reach the
#   reporting DB and API containers.
---
x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-ghcr.io/hcv-dev/hcv-airflow:latest}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@${STACK_NAME:-hcv-airflow}-postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@${STACK_NAME:-hcv-airflow}-postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@${STACK_NAME:-hcv-airflow}-redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-}
    AIRFLOW__API__AUTH_BACKEND: 'airflow.api.auth.backend.jwt'
    AIRFLOW__API_AUTH__JWT_SECRET: ${INTERNAL_API_SECRET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://${STACK_NAME:-hcv-airflow}-apiserver:8080/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    AIRFLOW_UID: ${AIRFLOW_UID:-50000}

    # ── Airflow Connections (injected via env vars) ──────────────────────
    # These create connections in the Airflow metadata DB on startup.
    # Visible in the UI under Admin > Connections.
    #
    # Reporting PostgreSQL (standard URI)
    AIRFLOW_CONN_HCV_REPORTING_DB: ${HCV_REPORTING_DB_URL:-}
    # ICU SQL Server (ODBC string stored as generic connection description)
    AIRFLOW_CONN_HCV_ICU: ${HCV_ICU_CONN_STRING:-}

    # ── Airflow Variables (available to DAGs via Variable.get()) ─────────
    AIRFLOW_VAR_HCV_ENVIRONMENT: ${STACK_NAME:-hcv-airflow}

    # ── SMTP (email notifications — SendGrid in prod) ───────────────────
    # SendGrid requires SMTP_USER="apikey" (literal) and SMTP_PASSWORD=<API key>.
    # The SMTP provider hook also requires a matching Airflow connection to exist,
    # so we inject `smtp_default` from the same values.
    AIRFLOW__SMTP__SMTP_HOST: ${SMTP_HOST:-smtp.sendgrid.net}
    AIRFLOW__SMTP__SMTP_PORT: ${SMTP_PORT:-587}
    AIRFLOW__SMTP__SMTP_STARTTLS: ${SMTP_STARTTLS:-True}
    AIRFLOW__SMTP__SMTP_SSL: ${SMTP_SSL:-False}
    AIRFLOW__SMTP__SMTP_USER: ${SMTP_USER:-apikey}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${SENDGRID_API_KEY:-}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${SMTP_FROM:-airflow@hcv.co.za}
    # Extras pin STARTTLS on / implicit-SSL off so the hook can't fall back to
    # stale cfg defaults — avoids SSL: WRONG_VERSION_NUMBER on port 587.
    AIRFLOW_CONN_SMTP_DEFAULT: smtp://${SMTP_USER:-apikey}:${SENDGRID_API_KEY:-}@${SMTP_HOST:-smtp.sendgrid.net}:${SMTP_PORT:-587}/?use_ssl=false&disable_tls=false&disable_ssl=true

  volumes:
    - airflow-dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
    - ./plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - hcv-net
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  # ── Git-sync sidecar — keeps DAGs in sync with the repository ──────────────
  git-sync:
    image: alpine/git:latest
    container_name: ${STACK_NAME:-hcv-airflow}-git-sync
    restart: always
    volumes:
      - airflow-dags:/dags
    environment:
      REPO_URL: ${DAGS_REPO_URL:-https://github.com/HCV-Dev/hcv-airflow-dags.git}
      GIT_USER: ${DAGS_GIT_USER:-}
      GIT_PAT: ${DAGS_GIT_PAT:-}
      BRANCH: ${DAGS_REPO_BRANCH:-main}
      SYNC_INTERVAL: ${DAGS_SYNC_INTERVAL:-60}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        git config --global --add safe.directory /dags

        # Build authenticated URL if credentials are provided
        if [ -n "$$GIT_USER" ] && [ -n "$$GIT_PAT" ]; then
          AUTH_URL=$$(echo "$$REPO_URL" | sed "s|https://|https://$$GIT_USER:$$GIT_PAT@|")
        else
          AUTH_URL="$$REPO_URL"
        fi

        if [ ! -d /dags/.git ]; then
          echo "[git-sync] Cloning $$REPO_URL (branch: $$BRANCH)..."
          rm -rf /dags/*  /dags/.[!.]* 2>/dev/null || true
          git clone --branch "$$BRANCH" --single-branch --depth 1 "$$AUTH_URL" /dags
          if [ $$? -ne 0 ]; then
            echo "[git-sync] ERROR: Clone failed. Check REPO_URL, credentials, and network access."
            sleep 30
            exit 1
          fi
        fi
        while true; do
          cd /dags
          git remote set-url origin "$$AUTH_URL"
          git fetch origin "$$BRANCH" --depth 1
          git reset --hard "origin/$$BRANCH"
          echo "[git-sync] Synced at $$(date -Iseconds) — $$(git log -1 --format='%h %s')"
          sleep "$$SYNC_INTERVAL"
        done
    networks:
      - hcv-net

  postgres:
    image: postgres:16
    container_name: ${STACK_NAME:-hcv-airflow}-postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data
    networks:
      - hcv-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7.2-bookworm
    container_name: ${STACK_NAME:-hcv-airflow}-redis
    restart: always
    networks:
      - hcv-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s

  airflow-apiserver:
    <<: *airflow-common
    container_name: ${STACK_NAME:-hcv-airflow}-apiserver
    command: api-server
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: ${STACK_NAME:-hcv-airflow}-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    container_name: ${STACK_NAME:-hcv-airflow}-dag-processor
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    container_name: ${STACK_NAME:-hcv-airflow}-worker
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: ${STACK_NAME:-hcv-airflow}-triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: ${STACK_NAME:-hcv-airflow}-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo -e "\033[1;33mWARNING: AIRFLOW_UID not set!\e[0m"
          export AIRFLOW_UID=$$(id -u)
        fi
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        echo "Airflow version:"
        /entrypoint airflow version
        chown -R "$${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins}
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    container_name: ${STACK_NAME:-hcv-airflow}-cli
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

volumes:
  airflow-dags:
  airflow-pgdata:
  airflow-logs:

networks:
  hcv-net:
    external: true
